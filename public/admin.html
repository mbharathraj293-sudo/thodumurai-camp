<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sivakumar Admin Panel</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Cinzel:wght@700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary-red: #D32F2F;
      --bg-dark: #121212;
      --bg-card: #1e1e1e;
      --text-light: #ffffff;
      --text-muted: #aaaaaa;
      --gold: #FFD700;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-light);
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #0a0a0a;
      padding: 1.5rem 2rem;
      border-bottom: 2px solid var(--primary-red);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn-back {
      background: #444;
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .btn-back:hover {
      background: #555;
    }

    .admin-title {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      margin: 0;
    }

    .btn-export {
      background: var(--primary-red);
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .btn-export:hover {
      background: #b71c1c;
    }

    @media (max-width: 600px) {
      header {
        flex-direction: column;
        text-align: center;
      }

      .header-actions {
        width: 100%;
        justify-content: center;
      }
    }

    .dashboard {
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .stat-card {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: 8px;
      border-left: 5px solid var(--primary-red);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .stat-card h3 {
      margin: 0 0 0.5rem 0;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .stat-card p {
      margin: 0;
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--gold);
    }

    .table-container {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .table-header h2 {
      margin: 0;
    }

    input#searchInput {
      padding: 10px 15px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #111;
      color: white;
      width: 300px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th,
    td {
      padding: 12px 15px;
      border-bottom: 1px solid #333;
    }

    th {
      background-color: #2a2a2a;
      color: var(--gold);
      font-weight: 600;
    }

    tr:hover {
      background-color: #2a2a2a;
    }

    .btn-delete {
      background: #f44336;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-delete:hover {
      background: #d32f2f;
    }

    .btn-view-img {
      background: #2196F3;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-view-img:hover {
      background: #1976D2;
    }

    /* Image Modal */
    #imgModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #imgModal img {
      max-width: 90%;
      max-height: 90%;
      border: 5px solid white;
    }

    .close-modal {
      position: absolute;
      top: 30px;
      right: 30px;
      color: white;
      font-size: 40px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <header>
    <h1 class="admin-title">Admin Panel</h1>
    <div class="header-actions">
      <a href="index.html" class="btn-back">⬅ Back</a>
      <button id="downloadExcelBtn" class="btn-export"
        style="border:none; cursor:pointer; font-family:var(--font-main);">📥 Download Excel</button>
    </div>
  </header>

  <main class="dashboard">
    <div class="stats-container">
      <div class="stat-card">
        <h3>Total Registrations</h3>
        <p id="statTotal">0</p>
      </div>
      <div class="stat-card" style="border-left-color: #FF9800;">
        <h3>Offline Payments</h3>
        <p id="statOffline">0</p>
      </div>
    </div>

    <div class="table-container">
      <div class="table-header">
        <h2>Registrations Data</h2>
        <input type="text" id="searchInput" placeholder="Search by name, phone, city...">
      </div>

      <table id="regTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Phone</th>
            <th>City</th>
            <th>Payment Mode</th>
            <th>Payment Proof</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Rows injected via JS -->
          <tr>
            <td colspan="7" style="text-align: center;">Loading data...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <div id="imgModal">
    <span class="close-modal" id="closeModal">&times;</span>
    <img id="modalImg" src="" alt="Payment Proof">
  </div>

  <script src="admin.js"></script>
</body>

</html>
